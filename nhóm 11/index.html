<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechStore - Chuyên Gia Công Nghệ</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --accent: #ef4444;
            --success: #10b981;
            --dark: #0f172a;
            --gray-bg: #f8fafc;
            --text-main: #1e293b;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', 'Segoe UI', sans-serif; background: var(--gray-bg); color: var(--text-main); line-height: 1.6; }

        /* PROMO BAR */
        .promo-bar {
            background: linear-gradient(90deg, #1e3a8a, #ef4444);
            color: white; padding: 8px 0; font-size: 13px; font-weight: 600; text-align: center;
        }

        /* HEADER */
        .header { 
            background: var(--dark); color: white; padding: 1rem 5%; 
            display: flex; align-items: center; justify-content: space-between; 
            position: sticky; top: 0; z-index: 1000; box-shadow: var(--shadow);
        }
        .logo { font-size: 1.8rem; font-weight: 800; color: #60a5fa; cursor: pointer; }
        .search-box { flex: 0 1 400px; }
        .search-box input { width: 100%; padding: 10px 20px; border-radius: 25px; border: none; outline: none; }

        .header-right { display: flex; gap: 25px; align-items: center; }

        /* SỬA LỖI ICON GIỎ HÀNG */
        .cart-wrapper {
            position: relative;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            transition: 0.2s;
        }
        .cart-wrapper:hover { background: rgba(255,255,255,0.1); border-radius: 50%; }
        
        #cart-count {
            position: absolute;
            top: -2px;
            right: -2px;
            background: var(--accent);
            color: white;
            border-radius: 50%;
            min-width: 18px;
            height: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: bold;
            border: 2px solid var(--dark);
            padding: 0 4px;
        }

        /* NAVIGATION */
        .sub-nav { 
            display: flex; justify-content: center; gap: 10px; padding: 12px; background: white; 
            border-bottom: 1px solid #e2e8f0; position: sticky; top: 68px; z-index: 999;
        }
        .sub-nav button { 
            border: 1px solid #e2e8f0; background: white; font-weight: 600; color: #64748b; 
            cursor: pointer; padding: 8px 16px; border-radius: 8px; transition: 0.3s;
        }
        .sub-nav button:hover { border-color: var(--primary); color: var(--primary); background: #eff6ff; }

        /* LAYOUT */
        .main-container { display: grid; grid-template-columns: 260px 1fr; gap: 25px; padding: 25px 5%; }
        .sidebar { background: white; border-radius: 12px; padding: 20px; height: fit-content; position: sticky; top: 130px; box-shadow: var(--shadow); }
        .sidebar-item { display: flex; align-items: center; gap: 12px; padding: 12px; cursor: pointer; border-radius: 8px; font-weight: 500; }
        .sidebar-item:hover { background: #f1f5f9; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); gap: 20px; }

        /* MODAL */
        .modal { 
            display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
        }
        .modal-content { 
            background: white; margin: 5vh auto; padding: 25px; border-radius: 16px; 
            position: relative; animation: slideIn 0.3s ease; box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.2);
        }
        @keyframes slideIn { from { transform: translateY(-20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .close-modal { position: absolute; right: 20px; top: 15px; font-size: 28px; cursor: pointer; color: #94a3b8; }

        /* AUTH & BUTTONS */
        .auth-form input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #e2e8f0; border-radius: 8px; }
        .btn-auth { 
            width: 100%; padding: 14px; background: var(--primary); color: white; 
            border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px;
        }
        .btn-auth:hover { background: var(--primary-hover); }

        /* SỬA GIAO DIỆN GIỎ HÀNG */
        #cart-items-list {
            margin-top: 15px;
        }
        /* Style cho từng item trong giỏ (sẽ render từ JS) */
        .cart-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 12px 0;
            border-bottom: 1px solid #f1f5f9;
        }
        .cart-item img { width: 60px; height: 60px; object-fit: cover; border-radius: 8px; }
        .cart-item-info { flex: 1; }
        .cart-item-info h4 { font-size: 14px; color: var(--dark); }
        .cart-item-info p { font-size: 13px; color: var(--accent); font-weight: bold; }
        
        #login-promo-box {
            text-align: center; background: linear-gradient(135deg, #eff6ff 0%, #dbeafe 100%);
            padding: 25px; border-radius: 12px; border: 2px dashed var(--primary); display: none;
        }
    </style>
</head>
<body>

    <div class="promo-bar">
        ⚡ HOT DEAL: Nhập mã <span style="color: #fde047;">TECHSTORE2026</span> giảm ngay 10% đơn hàng! ⚡
    </div>

    <header class="header">
        <div class="logo" onclick="location.reload()">TechStore</div>
        
        <div class="search-box">
            <input type="text" id="search-input" placeholder="Tìm kiếm linh kiện, máy tính..." oninput="searchProducts()">
        </div>

        <div class="header-right">
            <div id="auth-section">
                <button onclick="toggleModal('auth-modal')" style="background: var(--primary); color: white; border: none; padding: 10px 22px; border-radius: 25px; cursor: pointer; font-weight: 600; display: flex; align-items: center; gap: 8px;">
                    <i class="fas fa-user-circle"></i> Tài khoản
                </button>
            </div>
            
            <div class="cart-wrapper" onclick="toggleModal('cart-modal')">
                <i class="fas fa-shopping-bag" style="font-size: 22px;"></i>
                <span id="cart-count">0</span>
            </div>
        </div>
    </header>

    <nav class="sub-nav">
        <button onclick="filterProduct('all')"><i class="fas fa-layer-group"></i> Tất cả</button>
        <button onclick="filterProduct('phone')"><i class="fas fa-mobile-alt"></i> Điện thoại</button>
        <button onclick="filterProduct('laptop')"><i class="fas fa-laptop"></i> Laptop</button>
        <button onclick="filterProduct('pc')"><i class="fas fa-desktop"></i> PC Bộ</button>
        <button onclick="filterProduct('component')"><i class="fas fa-microchip"></i> Linh kiện</button>
        <button onclick="filterProduct('headphone')"><i class="fas fa-headphones"></i> Tai nghe</button>
        <button onclick="filterProduct('gear')"><i class="fas fa-keyboard"></i> Gear</button>
    </nav>

    <div class="main-container">
        <aside class="sidebar">
            <p style="font-size: 11px; font-weight: 800; color: #94a3b8; margin-bottom: 15px; letter-spacing: 1px;">QUẢN LÝ</p>
            <div class="sidebar-item" onclick="showHistory()"><i class="fas fa-history" style="color: #f59e0b;"></i><span>Lịch sử đơn</span></div>
            <div class="sidebar-item" onclick="showBalanceHistory()"><i class="fas fa-wallet" style="color: var(--success);"></i><span>Ví điện tử</span></div>
            <div class="sidebar-item" onclick="alert('Đang kết nối...')"><i class="fas fa-headset" style="color: var(--accent);"></i><span>Hỗ trợ 24/7</span></div>
        </aside>

        <main id="product-list" class="product-grid"></main>
    </div>

    <div id="auth-modal" class="modal">
        <div class="modal-content" style="width: 400px;">
            <span class="close-modal" onclick="toggleModal('auth-modal')">&times;</span>
            <div id="login-promo-box">
                <i class="fas fa-gift" style="font-size: 40px; color: var(--primary); margin-bottom: 15px;"></i>
                <h3 style="color: var(--primary);">ƯU ĐÃI THÀNH VIÊN!</h3>
                <p style="margin: 10px 0; font-size: 14px;">Bạn nhận được mã giảm <b style="color: var(--accent);">GIFT50K</b></p>
                <button class="btn-auth" onclick="toggleModal('auth-modal')">NHẬN NGAY</button>
            </div>
            <div id="auth-form-container">
                <div class="modal-header">
                    <button class="tab-btn active" id="tab-login" onclick="switchTab('login')">ĐĂNG NHẬP</button>
                    <button class="tab-btn" id="tab-reg" onclick="switchTab('reg')">ĐĂNG KÝ</button>
                </div>
                <form id="login-form" class="auth-form">
                    <input type="text" id="username" placeholder="Tên đăng nhập" required>
                    <input type="password" id="password" placeholder="Mật khẩu" required>
                    <button type="submit" class="btn-auth">ĐĂNG NHẬP</button>
                </form>
                <form id="register-form" class="auth-form" style="display:none">
                    <input type="text" id="reg-user" placeholder="Tên tài khoản mới" required>
                    <input type="password" id="reg-pass" placeholder="Mật khẩu" required>
                    <input type="password" id="reg-repass" placeholder="Xác nhận mật khẩu" required>
                    <button type="submit" class="btn-auth" style="background: var(--success);">ĐĂNG KÝ</button>
                </form>
            </div>
        </div>
    </div>

    <div id="cart-modal" class="modal">
        <div class="modal-content" style="width: 450px;">
            <span class="close-modal" onclick="toggleModal('cart-modal')">&times;</span>
            <h2 style="color: var(--dark); font-weight: 800; border-bottom: 2px solid #f1f5f9; padding-bottom: 15px;">
                <i class="fas fa-shopping-cart" style="color: var(--primary);"></i> Giỏ hàng
            </h2>
            
            <div id="cart-items-list" style="max-height: 350px; overflow-y: auto;">
                </div>

            <div style="margin-top: 20px; padding-top: 15px; border-top: 2px solid #f1f5f9;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                    <span style="font-weight: 600; color: #64748b;">Tổng cộng:</span>
                    <span id="cart-total" style="color: var(--accent); font-size: 1.5rem; font-weight: 800;">0đ</span>
                </div>
                <button class="btn-auth" style="background: var(--success); margin: 0; display: flex; align-items: center; justify-content: center; gap: 10px;" onclick="openCheckout()">
                    <i class="fas fa-credit-card"></i> THANH TOÁN NGAY
                </button>
                <p style="text-align: center; font-size: 12px; color: #94a3b8; margin-top: 10px;">Miễn phí vận chuyển cho đơn hàng từ 500k</p>
            </div>
        </div>
    </div>

    <div id="detail-modal" class="modal">
        <div class="modal-content" style="width: 800px; max-height: 90vh; overflow-y: auto;">
            <span class="close-modal" onclick="toggleModal('detail-modal')">&times;</span>
            <div id="detail-content"></div>
        </div>
    </div>

    <script src="data.js"></script>
    <script>
        function showLoginPromo() {
            document.getElementById('auth-form-container').style.display = 'none';
            document.getElementById('login-promo-box').style.display = 'block';
            if(document.getElementById('auth-modal').style.display !== 'block') toggleModal('auth-modal');
        }
    </script>
</body>
</html>
