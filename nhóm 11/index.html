<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechStore - Thế giới công nghệ</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="header">
        <div class="logo">TechStore</div>
        
        <div class="search-box">
            <input type="text" id="search-input" placeholder="Bạn muốn tìm linh kiện gì..." oninput="searchProducts()">
        </div>

        <div class="header-right" style="display: flex; gap: 20px; align-items: center;">
            <div id="auth-section">
                <button onclick="toggleModal('auth-modal')" style="background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: 600;">
                    <i class="fas fa-user"></i> Tài khoản
                </button>
            </div>
            
            <div class="cart-icon" onclick="toggleModal('cart-modal')" style="position: relative; color: white; font-size: 22px; cursor: pointer;">
                <i class="fas fa-shopping-cart"></i>
                <span id="cart-count" style="position: absolute; top: -10px; right: -10px; background: var(--accent); color: white; border-radius: 50%; padding: 2px 6px; font-size: 12px; font-weight: bold;">0</span>
            </div>
        </div>
    </header>

    <nav class="sub-nav">
        <button onclick="filterProduct('all')"><i class="fas fa-border-all"></i> Tất cả</button>
        <button onclick="filterProduct('phone')"><i class="fas fa-mobile-alt"></i> Điện thoại</button>
        <button onclick="filterProduct('laptop')"><i class="fas fa-laptop"></i> Laptop</button>
        <button onclick="filterProduct('pc')"><i class="fas fa-desktop"></i> PC Bộ</button>
        <button onclick="filterProduct('component')"><i class="fas fa-microchip"></i> Linh kiện</button>
        <button onclick="filterProduct('headphone')"><i class="fas fa-headphones"></i> Tai nghe</button>
        <button onclick="filterProduct('gear')"><i class="fas fa-chair"></i> Bàn/Ghế</button>
    </nav>

    <div class="main-container">
        <aside class="sidebar">
            <h3>MENU CÁ NHÂN</h3>
            <div class="sidebar-item" onclick="alert('Lịch sử mua hàng trống')">
                <i class="fas fa-history" style="color: #fbbf24;"></i>
                <span>Lịch sử mua</span>
            </div>
            <div class="sidebar-item" onclick="alert('Số dư hiện tại: 0đ')">
                <i class="fas fa-wallet" style="color: #34d399;"></i>
                <span>Biến động số dư</span>
            </div>
            <div class="sidebar-item" onclick="alert('Tổng đài hỗ trợ: 1900 1234')">
                <i class="fas fa-headset" style="color: #f87171;"></i>
                <span>Khiếu Nại</span>
            </div>
            <div class="sidebar-item" onclick="alert('Bot AI đang trực tuyến')">
                <i class="fas fa-robot" style="color: #60a5fa;"></i>
                <span>Bot (Hào/ma 5020)</span>
            </div>
        </aside>

        <main id="product-list" class="product-grid">
            </main>
    </div>

    <div id="auth-modal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="toggleModal('auth-modal')">&times;</span>
            <div class="modal-header">
                <button class="tab-btn active" id="tab-login" onclick="switchTab('login')">ĐĂNG NHẬP</button>
                <button class="tab-btn" id="tab-reg" onclick="switchTab('reg')">ĐĂNG KÝ</button>
            </div>
            <form id="login-form" class="auth-form">
                <div style="text-align: center; margin-bottom: 15px;">
                    <i class="fas fa-shield-alt" style="font-size: 40px; color: var(--primary);"></i>
                </div>
                <input type="text" id="username" placeholder="Tên đăng nhập (admin)" required>
                <input type="password" id="password" placeholder="Mật khẩu (123456)" required>
                <button type="submit" class="btn-auth">VÀO CỬA HÀNG</button>
            </form>
            <form id="register-form" class="auth-form" style="display:none">
                <input type="text" id="reg-user" placeholder="Tên tài khoản mới" required>
                <input type="password" id="reg-pass" placeholder="Mật khẩu" required>
                <input type="password" id="reg-repass" placeholder="Nhập lại mật khẩu" required>
                <button type="submit" class="btn-auth" style="background: #10b981;">TẠO TÀI KHOẢN</button>
            </form>
        </div>
    </div>

    <div id="detail-modal" class="modal">
        <div class="modal-content" style="width: 800px; max-width: 95%;">
            <span class="close-modal" onclick="toggleModal('detail-modal')">&times;</span>
            <div id="detail-content"></div>
        </div>
    </div>

    <div id="cart-modal" class="modal">
        <div class="modal-content" style="width: 500px; max-width: 95%;">
            <span class="close-modal" onclick="toggleModal('cart-modal')">&times;</span>
            <h2 style="text-align: center; color: var(--primary);"><i class="fas fa-shopping-basket"></i> Giỏ Hàng</h2>
            <hr>
            <div id="cart-items-list" style="max-height: 400px; overflow-y: auto; margin-bottom: 20px;">
                <p style="text-align: center; color: #888; padding: 20px;">Giỏ hàng đang trống...</p>
            </div>
            <div id="cart-summary" style="border-top: 2px solid #eee; padding-top: 15px;">
                <div style="display: flex; justify-content: space-between; font-weight: bold; font-size: 1.2rem;">
                    <span>Tổng tiền:</span>
                    <span id="cart-total" style="color: var(--accent);">0đ</span>
                </div>
                <button class="btn-auth" style="margin-top: 15px; background: #10b981;" onclick="alert('Cảm ơn bạn! Đơn hàng đã được ghi nhận.')">THANH TOÁN NGAY</button>
            </div>
        </div>
    </div>

    <script src="data.js"></script>
</body>
</html>
