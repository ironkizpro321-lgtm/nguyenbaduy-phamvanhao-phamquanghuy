<!DOCTYPE html>
<html>
<head>
  <title>Đăng nhập / Đăng ký</title>
  <style>
    body{
      font-family: Arial;
      background:#f2f2f2;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    .box{
      background:white;
      padding:30px;
      width:300px;
      border-radius:10px;
      box-shadow:0 0 10px rgba(0,0,0,0.1);
      text-align:center;
    }

    input{
      width:100%;
      padding:8px;
      margin:8px 0;
    }

    button{
      width:100%;
      padding:8px;
      margin-top:10px;
      cursor:pointer;
    }

    .switch{
      color:blue;
      cursor:pointer;
      margin-top:10px;
      display:block;
    }
  </style>
</head>
<body>

<div class="box">

  <h2 id="title">Đăng nhập</h2>

  <input type="text" id="email" placeholder="Nhập Gmail">
  <input type="password" id="password" placeholder="Nhập mật khẩu">

  <button onclick="submitForm()">Xác nhận</button>

  <span class="switch" onclick="toggleForm()">
    Chưa có tài khoản? Đăng ký
  </span>

</div>

<script>
  let isLogin = true;

  function toggleForm(){
    isLogin = !isLogin;
    document.getElementById("title").innerText = isLogin ? "Đăng nhập" : "Đăng ký";
    document.querySelector(".switch").innerText = isLogin 
      ? "Chưa có tài khoản? Đăng ký"
      : "Đã có tài khoản? Đăng nhập";
  }

  function submitForm(){
    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;

    if(!email || !password){
      alert("Vui lòng nhập đầy đủ thông tin");
      return;
    }

    let users = JSON.parse(localStorage.getItem("users")) || [];

    if(isLogin){
      let user = users.find(u => u.email === email && u.password === password);
      if(user){
        alert("Đăng nhập thành công!");
        localStorage.setItem("currentUser", email);
        window.location.href = "index.html";
      } else {
        alert("Sai tài khoản hoặc mật khẩu!");
      }
    } else {
      let exists = users.find(u => u.email === email);
      if(exists){
        alert("Email đã tồn tại!");
      } else {
        users.push({email, password});
        localStorage.setItem("users", JSON.stringify(users));
        alert("Đăng ký thành công! Giờ đăng nhập đi 😎");
        toggleForm();
      }
    }
  }
</script>

</body>
</html>
